name: Publish npm package

on:
  release:
    # Trigger on "published" so the workflow runs when a release (including
    # one promoted from a draft) is actually published, not just created.
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.32.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.32.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
